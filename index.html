<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Ultimate fix for 'Cannot set property fetch of #<Window>'
      window.global = window;
      (function() {
        var _fetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return _fetch; },
            set: function(v) { 
              console.warn('Intercepted fetch overwrite');
              _fetch = v; 
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          // If the above fails, its likely already restricted. 
          // We can't do much more here but log it.
          console.debug('Fetch protection partial');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
